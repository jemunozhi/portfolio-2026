<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f2ec" />
    <title>Julian Munoz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;1,400&display=block"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="./assets/landing/favicon.svg" />
    <link rel="stylesheet" href="./css/global.css" />
  </head>
  <body>
    <main class="viewport-grid" aria-label="Uploading portfolio screen">
      <section class="main-container">
        <div class="main">
          <div class="header-logo-jm-wrap">
            <img
              class="header-logo-jm"
              src="./assets/landing/logo-jm.svg"
              alt="JM logo"
              width="80"
              height="80"
            />
            <span class="header-logo-jm-square" aria-hidden="true"></span>
          </div>
          <div class="status-text" aria-live="polite">
            <p class="status-text__primary">Portfolio taking shape</p>
            <p class="status-text__secondary">More is coming.</p>
          </div>
          <div class="cta" aria-label="Secondary call to action">
            <a
              class="button-icon-final"
              href="https://www.linkedin.com/in/jemunozhi/"
              target="_blank"
              rel="noopener noreferrer"
              data-tone="default"
              data-size="small"
              data-state="enabled"
              aria-label="Open LinkedIn profile"
            >
              <span class="button-icon-final__state-layer">
                <span class="button-icon-final__icon" aria-hidden="true">
                  <img
                    class="button-icon-final__icon-image button-icon-final__icon-image--default-dark"
                    src="./assets/landing/social-icon_linkedin.svg"
                    alt=""
                  />
                  <img
                    class="button-icon-final__icon-image button-icon-final__icon-image--default-light"
                    src="./assets/landing/social-icon_linkedin.svg"
                    alt=""
                  />
                  <img
                    class="button-icon-final__icon-image button-icon-final__icon-image--small-dark"
                    src="./assets/landing/social-icon_linkedin.svg"
                    alt=""
                  />
                  <img
                    class="button-icon-final__icon-image button-icon-final__icon-image--small-light"
                    src="./assets/landing/social-icon_linkedin.svg"
                    alt=""
                  />
                </span>
              </span>
            </a>
            <p class="cta__caption">Start exploring here.</p>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
